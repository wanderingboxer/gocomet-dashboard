name: Update Dashboard

on:
  repository_dispatch:
    types: [update-dashboard]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code to update dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions "Read all transcript files in the /transcripts folder. Follow CLAUDE.md exactly. Add any new dates to dashboard.html without removing existing dates. Only process agents that have new transcript files added today."

      - name: Push updated dashboard
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add dashboard.html
          git diff --staged --quiet || git commit -m "Dashboard auto-update $(date +%Y-%m-%d)"
          git push
