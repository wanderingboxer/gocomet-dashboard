<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoComet Call Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #fff; font-family: system-ui, sans-serif; min-height: 100vh; }

    .header {
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; }
    .header-subtitle { font-size: 13px; color: #888; margin-top: 3px; letter-spacing: 0.04em; }
    .header-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: flex-end; }
    .date-label { font-size: 13px; color: #888; display: flex; align-items: center; gap: 8px; }
    .date-label select {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .date-label select:hover { border-color: #3a3d4a; }
    .last-updated { font-size: 12px; color: #444; }

    .main { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }

    .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
    @media (max-width: 900px) { .cards-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .cards-row { grid-template-columns: 1fr; } }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 18px 22px;
    }
    .card-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; font-weight: 600; }
    .card-value { font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
    .card-sub { font-size: 12px; color: #555; margin-top: 6px; }
    .card-green .card-value { color: #1D9E75; }
    .card-green .card-label { color: #1D9E75; }
    .card-amber .card-value { color: #EF9F27; }
    .card-amber .card-label { color: #EF9F27; }

    .agent-section { margin-bottom: 40px; }
    .agent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #2a2d3a;
      flex-wrap: wrap;
    }
    .agent-name { font-size: 18px; font-weight: 700; color: #fff; }
    .region-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-india { background: rgba(4,44,83,0.8); color: #7ab3e0; border: 1px solid rgba(122,179,224,0.2); }
    .badge-sea   { background: rgba(10,58,53,0.8); color: #4ecdc4; border: 1px solid rgba(78,205,196,0.2); }
    .badge-us    { background: rgba(45,31,74,0.8); color: #c4a9f0; border: 1px solid rgba(196,169,240,0.2); }
    .agent-rates { font-size: 12px; color: #555; margin-left: auto; display: flex; gap: 18px; flex-wrap: wrap; }
    .agent-rates span strong { font-weight: 600; }

    .vol-cards { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (max-width: 1100px) { .vol-cards { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px)  { .vol-cards { grid-template-columns: repeat(2, 1fr); } }

    .vol-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .vol-card-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; font-weight: 600; }
    .vol-card-value { font-size: 24px; font-weight: 700; color: #ccc; }
    .vol-card-pct { font-size: 11px; color: #555; margin-top: 3px; }
    .vol-answered .vol-card-value { color: #1D9E75; }

    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }

    .chart-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .chart-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; font-weight: 600; }
    .chart-wrap { height: 200px; position: relative; }
    .chart-no-data { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 13px; }

    .table-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .table-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 16px; border-bottom: 1px solid #2a2d3a; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #151722; }
    th { padding: 10px 13px; text-align: left; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; white-space: nowrap; }
    td { padding: 10px 13px; border-top: 1px solid #1e2130; color: #bbb; vertical-align: top; line-height: 1.4; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .dist-wrap { min-width: 80px; width: 100px; }
    .dist-bg { background: #2a2d3a; border-radius: 3px; height: 6px; margin-top: 2px; }
    .dist-fill { height: 6px; border-radius: 3px; transition: width 0.3s; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .scrollable { overflow-x: auto; overflow-y: auto; max-height: 300px; }
    .no-data-msg { color: #444; font-size: 13px; padding: 24px 16px; text-align: center; }

    .no-agent-data {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      color: #444;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #333;
      border-top: 1px solid #1a1d27;
      margin-top: 16px;
    }
  </style>
</head>

// ─── Config ───────────────────────────────────────────────────────────────────
const OUTCOME_ORDER = [
  'meeting_booked','callback_requested','asked_for_email',
  'not_interested','not_relevant','already_have_system',
  'wrong_contact','existing_customer','other'
];

const OUTCOME_CFG = {
  meeting_booked:     { label: 'Meeting Booked',     color: '#1D9E75', bg: 'rgba(29,158,117,0.18)' },
  callback_requested: { label: 'Callback Requested', color: '#EF9F27', bg: 'rgba(239,159,39,0.18)' },
  asked_for_email:    { label: 'Asked for Email',    color: '#f0c060', bg: 'rgba(240,192,96,0.18)' },
  not_interested:     { label: 'Not Interested',     color: '#E24B4A', bg: 'rgba(226,75,74,0.18)' },
  not_relevant:       { label: 'Not Relevant',       color: '#888',    bg: 'rgba(136,136,136,0.12)' },
  already_have_system:{ label: 'Has System',         color: '#777',    bg: 'rgba(119,119,119,0.12)' },
  wrong_contact:      { label: 'Wrong Contact',      color: '#666',    bg: 'rgba(102,102,102,0.12)' },
  existing_customer:  { label: 'Existing Customer',  color: '#555',    bg: 'rgba(85,85,85,0.12)' },
  other:              { label: 'Other',              color: '#444',    bg: 'rgba(68,68,68,0.12)' }
};

const VOL_COLORS = ['#1D9E75','#E24B4A','#EF9F27','#888','#555'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─── Helpers ──────────────────────────────────────────────────────────────────
let _charts = {};

function destroyCharts() {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  _charts = {};
}

function pct(n, d) {
  if (!d) return '—';
  return (n / d * 100).toFixed(1) + '%';
}

function badge(outcome) {
  const cfg = OUTCOME_CFG[outcome] || { label: outcome, color: '#888', bg: 'rgba(136,136,136,0.12)' };
  return `<span class="badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>`;
}

function sortedCalls(calls) {
  return [...calls].sort((a, b) => OUTCOME_ORDER.indexOf(a.outcome) - OUTCOME_ORDER.indexOf(b.outcome));
}

function makeDonut(id, labels, data, colors) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const total = data.reduce((s, v) => s + v, 0);
  if (total === 0) {
    canvas.parentElement.innerHTML = '<div class="chart-no-data">No data</div>';
    return;
  }
  const chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#1a1d27',
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: {
          position: 'right',
          labels: {
            color: '#888',
            font: { size: 11 },
            boxWidth: 11,
            padding: 7,
            filter: (item) => item.parsed > 0
          }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const v = ctx.parsed;
              const t = ctx.dataset.data.reduce((s, x) => s + x, 0);
              return ` ${ctx.label}: ${v} (${t ? (v/t*100).toFixed(1) : 0}%)`;
            }
          }
        }
      }
    }
  });
  _charts[id] = chart;
}

// ─── Agent Section Renderer ───────────────────────────────────────────────────
function renderAgent(key, data, name, badgeClass, regionLabel) {
  const { total, answered, no_answer, voicemail, busy, unknown, outcomes, calls } = data;

  if (total === 0) {
    return `
      <div class="agent-section">
        <div class="agent-header">
          <span class="agent-name">${name}</span>
          <span class="region-badge ${badgeClass}">${regionLabel}</span>
        </div>
        <div class="no-agent-data">No calls data for this date</div>
      </div>`;
  }

  // Volume cards
  const volCards = `
    <div class="vol-cards">
      <div class="vol-card">
        <div class="vol-card-label">Total</div>
        <div class="vol-card-value">${total}</div>
        <div class="vol-card-pct">&mdash;</div>
      </div>
      <div class="vol-card vol-answered">
        <div class="vol-card-label">Answered</div>
        <div class="vol-card-value">${answered}</div>
        <div class="vol-card-pct">${pct(answered, total)}</div>
      </div>
      <div class="vol-card">
        <div class="vol-card-label">No Answer</div>
        <div class="vol-card-value">${no_answer}</div>
        <div class="vol-card-pct">${pct(no_answer, total)}</div>
      </div>
      <div class="vol-card">
        <div class="vol-card-label">Voicemail</div>
        <div class="vol-card-value">${voicemail}</div>
        <div class="vol-card-pct">${pct(voicemail, total)}</div>
      </div>
      <div class="vol-card">
        <div class="vol-card-label">Busy</div>
        <div class="vol-card-value">${busy}</div>
        <div class="vol-card-pct">${pct(busy, total)}</div>
      </div>
      <div class="vol-card">
        <div class="vol-card-label">Unknown</div>
        <div class="vol-card-value">${unknown}</div>
        <div class="vol-card-pct">${pct(unknown, total)}</div>
      </div>
    </div>`;

  const volId = `vol_${key}`;
  const outId = `out_${key}`;

  const outLabels = OUTCOME_ORDER.map(k => OUTCOME_CFG[k].label);
  const outData   = OUTCOME_ORDER.map(k => outcomes[k] || 0);
  const outColors = OUTCOME_ORDER.map(k => OUTCOME_CFG[k].color);

  const charts = `
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Call Volume Breakdown</div>
        <div class="chart-wrap"><canvas id="${volId}"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Answered Outcomes</div>
        <div class="chart-wrap"><canvas id="${outId}"></canvas></div>
      </div>
    </div>`;

  // Outcome table
  let outcomeRows = '';
  OUTCOME_ORDER.forEach(k => {
    const cnt = outcomes[k] || 0;
    if (!cnt) return;
    const cfg = OUTCOME_CFG[k];
    const w = answered ? Math.min((cnt / answered) * 100, 100) : 0;
    outcomeRows += `
      <tr>
        <td>${badge(k)}</td>
        <td style="font-weight:700;color:#fff">${cnt}</td>
        <td style="color:#888">${pct(cnt, answered)}</td>
        <td>
          <div class="dist-wrap">
            <div class="dist-bg">
              <div class="dist-fill" style="width:${w.toFixed(1)}%;background:${cfg.color}"></div>
            </div>
          </div>
        </td>
      </tr>`;
  });

  const outcomeTable = answered > 0 ? `
    <div class="table-card" style="margin-bottom:16px">
      <div class="table-title">Outcome Summary</div>
      <table>
        <thead><tr><th>Outcome</th><th>Count</th><th>% of Answered</th><th>Distribution</th></tr></thead>
        <tbody>${outcomeRows}</tbody>
      </table>
    </div>` : '';

  // Calls detail table
  let callsTable;
  if (answered === 0) {
    callsTable = `<div class="table-card"><div class="no-data-msg">No answered calls for this date</div></div>`;
  } else {
    const rows = sortedCalls(calls).map(c => `
      <tr>
        <td style="white-space:nowrap;color:#fff;font-weight:500">${c.name}</td>
        <td>${c.company}</td>
        <td style="white-space:nowrap">${c.region}</td>
        <td style="white-space:nowrap">${c.duration}</td>
        <td>${badge(c.outcome)}</td>
        <td style="max-width:160px;font-size:12px">${c.pain_points}</td>
        <td style="max-width:220px;font-size:12px">${c.note}</td>
      </tr>`).join('');
    callsTable = `
      <div class="table-card">
        <div class="table-title">Answered Call Details</div>
        <div class="scrollable">
          <table>
            <thead><tr><th>Prospect</th><th>Company</th><th>Region</th><th>Duration</th><th>Outcome</th><th>Pain Points</th><th>Key Note</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  const pos = (outcomes.meeting_booked||0)+(outcomes.callback_requested||0)+(outcomes.asked_for_email||0);
  const rates = `
    <span class="agent-rates">
      <span>Answer Rate: <strong style="color:#aaa">${pct(answered,total)}</strong></span>
      <span>Meeting Rate: <strong style="color:#1D9E75">${pct(outcomes.meeting_booked||0,answered)}</strong></span>
      <span>Positive Rate: <strong style="color:#EF9F27">${pct(pos,answered)}</strong></span>
    </span>`;

  return {
    html: `
      <div class="agent-section">
        <div class="agent-header">
          <span class="agent-name">${name}</span>
          <span class="region-badge ${badgeClass}">${regionLabel}</span>
          ${rates}
        </div>
        ${volCards}
        ${charts}
        ${outcomeTable}
        ${callsTable}
      </div>`,
    volId, outId,
    volLabels: ['Answered','No Answer','Voicemail','Busy','Unknown'],
    volData: [answered, no_answer, voicemail, busy, unknown],
    volColors: VOL_COLORS,
    outLabels, outData, outColors
  };
}

// ─── Main Render ──────────────────────────────────────────────────────────────
function render(dateStr) {
  destroyCharts();
  const d = ALL_DATA[dateStr];

  const totalAll    = d.harshita.total   + d.zara.total   + d.maya.total;
  const answeredAll = d.harshita.answered + d.zara.answered + d.maya.answered;
  const meetsAll    = (d.harshita.outcomes.meeting_booked||0) + (d.zara.outcomes.meeting_booked||0) + (d.maya.outcomes.meeting_booked||0);
  const posAll = ['meeting_booked','callback_requested','asked_for_email']
    .reduce((s,k) => s + (d.harshita.outcomes[k]||0) + (d.zara.outcomes[k]||0) + (d.maya.outcomes[k]||0), 0);

  const summary = `
    <div class="cards-row">
      <div class="card">
        <div class="card-label">Total Calls</div>
        <div class="card-value">${totalAll}</div>
        <div class="card-sub">All agents combined</div>
      </div>
      <div class="card">
        <div class="card-label">Answered</div>
        <div class="card-value">${answeredAll}</div>
        <div class="card-sub">Answer rate: ${pct(answeredAll, totalAll)}</div>
      </div>
      <div class="card card-green">
        <div class="card-label">Meetings Booked</div>
        <div class="card-value">${meetsAll}</div>
        <div class="card-sub">Of answered: ${pct(meetsAll, answeredAll)}</div>
      </div>
      <div class="card card-amber">
        <div class="card-label">Positive Outcomes</div>
        <div class="card-value">${posAll}</div>
        <div class="card-sub">Meetings + callbacks + emails</div>
      </div>
    </div>`;

  const hResult = renderAgent('harshita', d.harshita, 'Harshita', 'badge-india', 'India');
  const zResult = renderAgent('zara',     d.zara,     'Zara',     'badge-sea',   'SEA');
  const mResult = renderAgent('maya',     d.maya,     'Maya',     'badge-us',    'US');

  const hHtml = typeof hResult === 'string' ? hResult : hResult.html;
  const zHtml = typeof zResult === 'string' ? zResult : zResult.html;
  const mHtml = typeof mResult === 'string' ? mResult : mResult.html;

  document.getElementById('content').innerHTML = summary + hHtml + zHtml + mHtml;

  setTimeout(() => {
    if (typeof hResult === 'object') {
      makeDonut(hResult.volId, hResult.volLabels, hResult.volData, hResult.volColors);
      makeDonut(hResult.outId, hResult.outLabels, hResult.outData, hResult.outColors);
    }
    if (typeof zResult === 'object') {
      makeDonut(zResult.volId, zResult.volLabels, zResult.volData, zResult.volColors);
      makeDonut(zResult.outId, zResult.outLabels, zResult.outData, zResult.outColors);
    }
    if (typeof mResult === 'object') {
      makeDonut(mResult.volId, mResult.volLabels, mResult.volData, mResult.volColors);
      makeDonut(mResult.outId, mResult.outLabels, mResult.outData, mResult.outColors);
    }
  }, 30);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const sel = document.getElementById('dateSelect');
  Object.keys(ALL_DATA)
    .sort()
    .reverse()
    .forEach(ds => {
      const [y, m, day] = ds.split('-');
      const opt = document.createElement('option');
      opt.value = ds;
      opt.textContent = `${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`;
      sel.appendChild(opt);
    });
  render(sel.value);
})();
</script>
