<html lang="en">

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #fff; font-family: system-ui, sans-serif; min-height: 100vh; }

    .header {
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; }
    .header-subtitle { font-size: 13px; color: #888; margin-top: 3px; letter-spacing: 0.04em; }
    .header-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: flex-end; }
    .date-label { font-size: 13px; color: #888; display: flex; align-items: center; gap: 8px; }
    .date-label select {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .date-label select:hover { border-color: #3a3d4a; }
    .last-updated { font-size: 12px; color: #444; }

    .filter-bar { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .mode-tabs {
      display: flex; gap: 2px;
      background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px; padding: 3px;
    }
    .mode-tab {
      background: none; border: none; color: #555; font-size: 13px;
      font-family: system-ui, sans-serif; padding: 5px 16px; border-radius: 6px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .mode-tab:hover { color: #aaa; }
    .mode-tab.active { background: #1a1d27; color: #fff; }
    .filter-control { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; min-height: 32px; }
    .filter-control select,
    .filter-control input[type="date"] {
      background: #0f1117; border: 1px solid #2a2d3a; color: #fff;
      padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
      outline: none; font-family: system-ui, sans-serif;
    }
    .filter-control select:hover,
    .filter-control input[type="date"]:hover { border-color: #3a3d4a; }
    .filter-control input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }
    .nav-btn {
      background: #0f1117; border: 1px solid #2a2d3a; color: #777;
      font-size: 16px; line-height: 1; padding: 4px 10px; border-radius: 6px;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .nav-btn:hover { color: #fff; border-color: #3a3d4a; }
    .nav-label { font-size: 13px; color: #aaa; white-space: nowrap; min-width: 200px; text-align: center; }
    .filter-sep { font-size: 12px; color: #444; }

    .main { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }

    .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
    @media (max-width: 900px) { .cards-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .cards-row { grid-template-columns: 1fr; } }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 18px 22px;
    }
    .card-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; font-weight: 600; }
    .card-value { font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
    .card-sub { font-size: 12px; color: #555; margin-top: 6px; }
    .card-green .card-value { color: #1D9E75; }
    .card-green .card-label { color: #1D9E75; }
    .card-amber .card-value { color: #EF9F27; }
    .card-amber .card-label { color: #EF9F27; }

    .agent-section { margin-bottom: 40px; }
    .agent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #2a2d3a;
      flex-wrap: wrap;
    }
    .agent-name { font-size: 18px; font-weight: 700; color: #fff; }
    .region-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-india { background: rgba(4,44,83,0.8); color: #7ab3e0; border: 1px solid rgba(122,179,224,0.2); }
    .badge-sea   { background: rgba(10,58,53,0.8); color: #4ecdc4; border: 1px solid rgba(78,205,196,0.2); }
    .badge-us    { background: rgba(45,31,74,0.8); color: #c4a9f0; border: 1px solid rgba(196,169,240,0.2); }
    .agent-rates { font-size: 12px; color: #555; margin-left: auto; display: flex; gap: 18px; flex-wrap: wrap; }
    .agent-rates span strong { font-weight: 600; }

    .vol-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (max-width: 1000px) { .vol-cards { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px)  { .vol-cards { grid-template-columns: repeat(2, 1fr); } }

    .vol-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .vol-card-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; font-weight: 600; }
    .vol-card-value { font-size: 24px; font-weight: 700; color: #ccc; }
    .vol-card-pct { font-size: 11px; color: #555; margin-top: 3px; }
    .vol-answered .vol-card-value { color: #1D9E75; }

    .table-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .table-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 16px; border-bottom: 1px solid #2a2d3a; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #151722; }
    th { padding: 10px 13px; text-align: left; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; white-space: nowrap; }
    td { padding: 10px 13px; border-top: 1px solid #1e2130; color: #bbb; vertical-align: top; line-height: 1.4; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .dist-wrap { min-width: 80px; width: 100px; }
    .dist-bg { background: #2a2d3a; border-radius: 3px; height: 6px; margin-top: 2px; }
    .dist-fill { height: 6px; border-radius: 3px; transition: width 0.3s; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .scrollable { overflow-x: auto; overflow-y: auto; max-height: 300px; }
    .no-data-msg { color: #444; font-size: 13px; padding: 24px 16px; text-align: center; }

    .no-agent-data {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      color: #444;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #333;
      border-top: 1px solid #1a1d27;
      margin-top: 16px;
    }
  </style>

// ─── Helpers ──────────────────────────────────────────────────────────────────
function pct(n, d) {
  if (!d) return '—';
  return (n / d * 100).toFixed(1) + '%';
}

function badge(outcome) {
  const cfg = OUTCOME_CFG[outcome] || { label: outcome, color: '#888', bg: 'rgba(136,136,136,0.12)' };
  return `<span class="badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>`;
}

function sortedCalls(calls) {
  return [...calls].sort((a, b) => OUTCOME_ORDER.indexOf(a.outcome) - OUTCOME_ORDER.indexOf(b.outcome));
}

// ─── Agent Section Renderer ───────────────────────────────────────────────────
function renderAgent(key, data, name, badgeClass, regionLabel, isMulti) {
  const { total, answered, no_answer, voicemail, busy, unknown, outcomes, calls } = data;

  if (total === 0) {
    return `

          <span class="region-badge ${badgeClass}">${regionLabel}</span>

  // Volume cards

    <div class="vol-cards">

        <div class="vol-card-label">Total</div>
        <div class="vol-card-value">${total}</div>

      <div class="vol-card">

        <div class="vol-card-value">${no_answer}</div>

      </div>
      <div class="vol-card">
        <div class="vol-card-label">Voicemail</div>
        <div class="vol-card-value">${voicemail}</div>
        <div class="vol-card-pct">${pct(voicemail, total)}</div>
      </div>
      <div class="vol-card">
        <div class="vol-card-label">Unknown</div>
        <div class="vol-card-value">${unknown}</div>
        <div class="vol-card-pct">${pct(unknown, total)}</div>
      </div>
    </div>`;

  // Outcome table
  let outcomeRows = '';
  OUTCOME_ORDER.forEach(k => {
    const cnt = outcomes[k] || 0;
    if (!cnt) return;
    const cfg = OUTCOME_CFG[k];
    const w = answered ? Math.min((cnt / answered) * 100, 100) : 0;
    outcomeRows += `
      <tr>
        <td>${badge(k)}</td>
        <td style="font-weight:700;color:#fff">${cnt}</td>
        <td style="color:#888">${pct(cnt, answered)}</td>
        <td>
          <div class="dist-wrap">
            <div class="dist-bg">
              <div class="dist-fill" style="width:${w.toFixed(1)}%;background:${cfg.color}"></div>
            </div>
          </div>
        </td>

  });

  const outcomeTable = answered > 0 ? `
    <div class="table-card" style="margin-bottom:16px">
      <div class="table-title">Outcome Summary</div>

        <thead><tr><th>Outcome</th><th>Count</th><th>% of Answered</th><th>Distribution</th></tr></thead>

  // Meetings booked table
  const meetingCalls = calls.filter(c => c.outcome === 'meeting_booked');
  let callsTable;
  if (meetingCalls.length === 0) {
    callsTable = `<div class="table-card"><div class="no-data-msg">No meetings booked for this period</div></div>`;
  } else {
    const dateHeader = isMulti ? '<th>Date</th>' : '';
    const rows = meetingCalls.map(c => {
      const dateCell = isMulti
        ? `<td style="white-space:nowrap;color:#666;font-size:12px">${c._date ? shortDate(c._date) : ''}</td>`
        : '';
      const revenue = COMPANY_REVENUE[c.company] || '—';
      const website = COMPANY_WEBSITE[c.company];
      const websiteCell = website
        ? `<a href="https://${website}" target="_blank" rel="noopener"
              style="color:#7ab3e0;text-decoration:none;font-size:12px"
              onmouseover="this.style.textDecoration='underline'"
              onmouseout="this.style.textDecoration='none'">${website}</a>`
        : '<span style="color:#444">—</span>';
      return `
      <tr>
        ${dateCell}
        <td style="white-space:nowrap;color:#fff;font-weight:500">${c.name}</td>
        <td style="white-space:nowrap">${c.company}</td>
        <td style="white-space:nowrap">${websiteCell}</td>
        <td style="white-space:nowrap;color:#1D9E75;font-weight:600">${revenue}</td>
        <td style="white-space:nowrap">${c.region}</td>
        <td style="white-space:nowrap">${c.duration}</td>
        <td style="max-width:180px;font-size:12px">${c.pain_points}</td>
        <td style="max-width:260px;font-size:12px">${c.note}</td>
      </tr>`;
    }).join('');
    callsTable = `
      <div class="table-card">
        <div class="table-title">Meetings Booked</div>

          <table>
            <thead><tr>${dateHeader}<th>Prospect</th><th>Company</th><th>Website</th><th>Revenue (USD Mn)</th><th>Region</th><th>Duration</th><th>Pain Points</th><th>Key Note</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  const pos = (outcomes.meeting_booked||0)+(outcomes.callback_requested||0)+(outcomes.asked_for_email||0);
  const rates = `
    <span class="agent-rates">
      <span>Answer Rate: <strong style="color:#aaa">${pct(answered,total)}</strong></span>
      <span>Meeting Rate: <strong style="color:#1D9E75">${pct(outcomes.meeting_booked||0,answered)}</strong></span>
      <span>Positive Rate: <strong style="color:#EF9F27">${pct(pos,answered)}</strong></span>
    </span>`;

  return `
      <div class="agent-section">
        <div class="agent-header">
          <span class="agent-name">${name}</span>
          <span class="region-badge ${badgeClass}">${regionLabel}</span>
          ${rates}
        </div>
        ${volCards}
        ${outcomeTable}
        ${callsTable}
      </div>`;
}

// ─── Filter State & Logic ─────────────────────────────────────────────────────
const ALL_DATES = Object.keys(ALL_DATA).sort(); // ascending: oldest first

function shortDate(ds) {
  const [y, m, d] = ds.split('-');
  return `${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`;
}

function isoToDate(ds) {
  const [y, m, d] = ds.split('-');
  return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
}

function dateToIso(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function mondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();                    // 0=Sun
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d;
}

const filterState = {
  mode: 'day',
  dayDate:     null,   // ISO string
  weekStart:   null,   // ISO string (Monday)
  monthYear:   null,   // 'YYYY-MM'
  customFrom:  null,   // ISO string
  customTo:    null    // ISO string
};

function getSelectedDates() {
  const { mode } = filterState;
  const latest = ALL_DATES[ALL_DATES.length - 1];

  if (mode === 'day') {
    const d = filterState.dayDate || latest;
    return ALL_DATA[d] ? [d] : [];
  }

  if (mode === 'week') {
    const ws = filterState.weekStart
      ? isoToDate(filterState.weekStart)
      : mondayOf(isoToDate(latest));
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    return ALL_DATES.filter(d => {
      const dt = isoToDate(d);
      return dt >= ws && dt <= we;
    }).reverse();
  }

  if (mode === 'month') {
    const ym = filterState.monthYear || latest.slice(0, 7);
    return ALL_DATES.filter(d => d.startsWith(ym)).reverse();
  }

  if (mode === 'custom') {
    const from = filterState.customFrom || ALL_DATES[0];
    const to   = filterState.customTo   || latest;
    return ALL_DATES.filter(d => d >= from && d <= to).reverse();
  }

  return [];
}

function aggregateDates(keys) {
  const valid = keys.filter(k => ALL_DATA[k]);
  if (!valid.length) return null;

  const result = {};
  ['harshita', 'zara', 'maya'].forEach(agent => {
    const agg = {
      total: 0, answered: 0, no_answer: 0, voicemail: 0, busy: 0, unknown: 0,
      outcomes: { meeting_booked:0, callback_requested:0, asked_for_email:0,
                  not_interested:0, not_relevant:0, already_have_system:0,
                  wrong_contact:0, existing_customer:0, other:0 },
      calls: []
    };
    valid.forEach(k => {
      const src = ALL_DATA[k][agent];
      agg.total     += src.total;
      agg.answered  += src.answered;
      agg.no_answer += src.no_answer;
      agg.voicemail += src.voicemail;
      agg.busy      += src.busy;
      agg.unknown   += src.unknown;
      OUTCOME_ORDER.forEach(ok => { agg.outcomes[ok] += (src.outcomes[ok] || 0); });
      src.calls.forEach(c => agg.calls.push({ ...c, _date: k }));
    });
    result[agent] = agg;
  });
  return result;
}

function setMode(mode) {
  filterState.mode = mode;
  const latest = ALL_DATES[ALL_DATES.length - 1];
  if (mode === 'week' && !filterState.weekStart) {
    filterState.weekStart = dateToIso(mondayOf(isoToDate(latest)));
  }
  if (mode === 'month' && !filterState.monthYear) {
    filterState.monthYear = latest.slice(0, 7);
  }
  if (mode === 'custom' && !filterState.customFrom) {
    filterState.customFrom = ALL_DATES[0];
    filterState.customTo   = latest;
  }
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  renderFilterControl();
  render();
}

function navigate(dir) {
  const { mode } = filterState;
  if (mode === 'week') {
    const d = isoToDate(filterState.weekStart);
    d.setDate(d.getDate() + dir * 7);
    filterState.weekStart = dateToIso(d);
  } else if (mode === 'month') {
    const [y, m] = filterState.monthYear.split('-').map(Number);
    const d = new Date(y, m - 1 + dir, 1);
    filterState.monthYear = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  renderFilterControl();
  render();
}

function renderFilterControl() {
  const el = document.getElementById('filterControl');
  if (!el) return;
  const { mode } = filterState;
  const latest = ALL_DATES[ALL_DATES.length - 1];

  if (mode === 'day') {
    const opts = ALL_DATES.slice().reverse().map(ds =>
      `<option value="${ds}"${ds === filterState.dayDate ? ' selected' : ''}>${shortDate(ds)}</option>`
    ).join('');
    el.innerHTML = `<select onchange="filterState.dayDate=this.value;render()">${opts}</select>`;
    return;
  }

  if (mode === 'week') {
    const ws = filterState.weekStart
      ? isoToDate(filterState.weekStart)
      : mondayOf(isoToDate(latest));
    filterState.weekStart = dateToIso(ws);
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    const label = `${shortDate(dateToIso(ws))} &ndash; ${shortDate(dateToIso(we))}`;
    el.innerHTML = `
      <button class="nav-btn" onclick="navigate(-1)">&#8249;</button>
      <span class="nav-label">${label}</span>
      <button class="nav-btn" onclick="navigate(1)">&#8250;</button>`;
    return;
  }

  if (mode === 'month') {
    const ym = filterState.monthYear || latest.slice(0, 7);
    filterState.monthYear = ym;
    const [y, m] = ym.split('-').map(Number);
    el.innerHTML = `
      <button class="nav-btn" onclick="navigate(-1)">&#8249;</button>
      <span class="nav-label" style="min-width:120px">${MONTHS[m-1]} ${y}</span>
      <button class="nav-btn" onclick="navigate(1)">&#8250;</button>`;
    return;
  }

  if (mode === 'custom') {
    const from = filterState.customFrom || ALL_DATES[0];
    const to   = filterState.customTo   || latest;
    el.innerHTML = `
      <input type="date" value="${from}" min="${ALL_DATES[0]}" max="${latest}"
        onchange="filterState.customFrom=this.value;render()">
      <span class="filter-sep">to</span>
      <input type="date" value="${to}" min="${ALL_DATES[0]}" max="${latest}"
        onchange="filterState.customTo=this.value;render()">`;
    return;
  }
}

// ─── Main Render ──────────────────────────────────────────────────────────────
function render() {
  const keys   = getSelectedDates();
  const d      = aggregateDates(keys);
  const isMulti = keys.length > 1;

  if (!d) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:#444;font-size:14px">
        No call data available for the selected period.
      </div>`;
    return;
  }

  const totalAll    = d.harshita.total    + d.zara.total    + d.maya.total;
  const answeredAll = d.harshita.answered + d.zara.answered + d.maya.answered;
  const meetsAll    = (d.harshita.outcomes.meeting_booked||0) + (d.zara.outcomes.meeting_booked||0) + (d.maya.outcomes.meeting_booked||0);
  const posAll = ['meeting_booked','callback_requested','asked_for_email']
    .reduce((s,k) => s + (d.harshita.outcomes[k]||0) + (d.zara.outcomes[k]||0) + (d.maya.outcomes[k]||0), 0);

  const sortedKeys = keys.slice().sort();
  const rangeLabel = keys.length === 0 ? '' : keys.length === 1
    ? shortDate(keys[0])
    : `${shortDate(sortedKeys[0])} – ${shortDate(sortedKeys[sortedKeys.length-1])}`;

  const summary = `
    <div class="cards-row">
      <div class="card">
        <div class="card-label">Total Calls</div>
        <div class="card-value">${totalAll}</div>
        <div class="card-sub">All agents · ${rangeLabel}</div>
      </div>
      <div class="card">
        <div class="card-label">Answered</div>
        <div class="card-value">${answeredAll}</div>
        <div class="card-sub">Answer rate: ${pct(answeredAll, totalAll)}</div>
      </div>
      <div class="card card-green">
        <div class="card-label">Meetings Booked</div>
        <div class="card-value">${meetsAll}</div>
        <div class="card-sub">Of answered: ${pct(meetsAll, answeredAll)}</div>
      </div>
      <div class="card card-amber">
        <div class="card-label">Positive Outcomes</div>
        <div class="card-value">${posAll}</div>
        <div class="card-sub">Meetings + callbacks + emails</div>
      </div>
    </div>`;

  const hHtml = renderAgent('harshita', d.harshita, 'Harshita', 'badge-india', 'India', isMulti);
  const zHtml = renderAgent('zara',     d.zara,     'Zara',     'badge-sea',   'SEA',   isMulti);
  const mHtml = renderAgent('maya',     d.maya,     'Maya',     'badge-us',    'US',    isMulti);

  document.getElementById('content').innerHTML = summary + hHtml + zHtml + mHtml;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  filterState.dayDate = ALL_DATES[ALL_DATES.length - 1];
  renderFilterControl();
  render();
})();
</script>
